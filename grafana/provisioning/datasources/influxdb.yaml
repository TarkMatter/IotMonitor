apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    # ダッシュボード JSON から参照するための固定 UID
    uid: influxdb-uid
    access: proxy
    # Docker ネットワーク内では influxdb というホスト名で接続
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: IotMonitor
      defaultBucket: environment
      tlsSkipVerify: true
    secureJsonData:
      # docker-compose.yml の DOCKER_INFLUXDB_INIT_ADMIN_TOKEN と一致させること
      token: my-super-secret-token
    editable: false
